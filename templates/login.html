<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Вход - PHOENIX България</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0f172a] h-screen flex items-center justify-center font-sans p-4">

    <div class="bg-[#1e293b] border border-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-8 text-center">
        <div class="mb-6">
            <i class="fa-solid fa-shield-heart text-red-500 text-5xl animate-pulse"></i>
            <h2 class="text-white text-2xl font-black tracking-wider mt-3">PHOENIX БЪЛГАРИЯ</h2>
            <p class="text-slate-400 text-xs mt-1 uppercase tracking-widest font-mono text-emerald-400">Национален Диспечерски Портал</p>
        </div>

        <!-- ФОРМА С AJAX ПРЕХВАЩАНЕ ЗА POP-UP ИЗВЕСТИЕ -->
        <form id="loginForm" method="POST" class="space-y-4">
            <div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 text-xs"><i class="fa-solid fa-user"></i></span>
                    <input type="text" name="username" id="username" required placeholder="Потребителско име" class="w-full bg-slate-950 border border-slate-800 rounded-lg pl-9 pr-3 py-2.5 text-xs text-white focus:outline-none focus:border-red-500 placeholder-slate-500">
                </div>
            </div>

            <div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 text-xs"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="password" id="password" required placeholder="Парола" class="w-full bg-slate-950 border border-slate-800 rounded-lg pl-9 pr-3 py-2.5 text-xs text-white focus:outline-none focus:border-red-500 placeholder-slate-500">
                </div>
            </div>

            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold text-xs py-3 rounded-lg uppercase tracking-wider transition cursor-pointer shadow-lg shadow-red-900/30">Вход в системата</button>
        </form>

        <div class="mt-6 pt-4 border-t border-slate-800/60 text-xs text-slate-400">
            Нямате акаунт? <a href="{{ url_for('register') }}" class="text-blue-400 hover:underline">Регистрирайте се тук</a>
        </div>
    </div>

    <!-- СКРИПТ ЗА ИЗСКАЧАЩОТО СЪОБЩЕНИЕ (POP-UP) -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Спира стандартното презареждане на страницата

            const formData = new FormData(this);

            fetch("{{ url_for('login') }}", {
                method: "POST",
                headers: {
                    "X-Requested-With": "XMLHttpRequest" // Казва на Flask, че това е AJAX заявка
                },
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Ако всичко е наред, пренасочваме към таблото
                    window.location.href = "{{ url_for('index') }}";
                } else {
                    // САМО pop-up известие при грешна парола или потребител
                    alert(data.message);
                }
            })
            .catch(error => {
                console.error("Грешка:", error);
                alert("❌ Възникна неочаквана грешка при връзката със сървъра.");
            });
        });
    </script>

</body>
</html>
