<!DOCTYPE html>
<html lang="bg" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>PHOENIX — Регистрация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>
<body class="auth-page">
    <div class="auth-box" id="register-box">
        <h2><i class="fas fa-user-plus"></i> РЕГИСТРАЦИЯ</h2>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Потребителско име" required>
            <input type="password" name="password" placeholder="Парола" required style="margin-top:8px;">
            <button type="submit" class="btn btn-red" style="margin-top:12px;">
                <i class="fas fa-check"></i> РЕГИСТРИРАЙ
            </button>
        </form>
        <p>Вече имате акаунт? <a href="{{ url_for('login') }}">Влезте</a></p>
    </div>
    <script>
        anime({ targets: '#register-box', scale: [0.88, 1], opacity: [0, 1], duration: 900, easing: 'easeOutBack' });
    </script>
</body>
</html>
