<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>PHOENIX - Регистрация на наблюдател</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
    </style>
</head>
<body class="h-screen flex items-center justify-center font-sans">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-xl p-8 shadow-2xl">
        <div class="text-center mb-6">
            <i class="fa-solid fa-user-plus text-blue-500 text-4xl mb-2"></i>
            <h1 class="text-2xl font-black text-white">Нова Регистрация</h1>
            <p class="text-xs text-slate-400 mt-1">Създаване на акаунт за гражданин/наблюдател</p>
        </div>

        <form action="" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Потребителско име</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" name="username" required placeholder="Изберете потребителско име..." class="w-full bg-slate-950 border border-slate-800 rounded-md pl-10 pr-3 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 transition">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Парола</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" name="password" required placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-md pl-10 pr-3 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 transition">
                </div>
            </div>

            <div class="space-y-1">
                <div class="flex justify-between items-center text-xs">
                    <span class="text-slate-400">Сила на паролата:</span>
                    <span id="strength-text" class="font-bold text-red-500">Твърде кратка</span>
                </div>
                <div class="w-full bg-slate-950 h-2 rounded-full overflow-hidden border border-slate-800/80">
                    <div id="strength-bar" class="w-0 h-full bg-red-500 transition-all duration-300"></div>
                </div>
                <p class="text-[10px] text-slate-500">Препоръчително: 6+ символа, цифра и главна буква.</p>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm py-3 rounded-md transition tracking-wide shadow-lg cursor-pointer mt-4">
                СЪЗДАЙ АКАУНТ
            </button>
        </form>

        <div class="mt-4 text-center">
            <a href="{{ url_for('login') }}" class="text-xs text-slate-400 hover:text-white transition"><i class="fa-solid fa-arrow-left mr-1"></i> Върни се към вход</a>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strength-bar');
        const strengthText = document.getElementById('strength-text');

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            let score = 0;

            if (val.length === 0) {
                strengthText.innerText = "Празно";
                strengthBar.style.width = "0%";
                return;
            }

            // 1. Проверка за дължина
            if (val.length >= 6) score++;
            if (val.length >= 10) score++;
            // 2. Съдържа ли цифра
            if (/[0-9]/.test(val)) score++;
            // 3. Съдържа ли главна буква
            if (/[A-Z]/.test(val)) score++;
            // 4. Съдържа ли специален символ
            if (/[^A-Za-z0-9]/.test(val)) score++;

            // Визуализация базирана на точките (score)
            if (score <= 1) {
                strengthText.innerText = "Слаба ❌";
                strengthText.className = "font-bold text-red-500";
                strengthBar.className = "h-full bg-red-500 transition-all";
                strengthBar.style.width = "25%";
            } else if (score === 2 || score === 3) {
                strengthText.innerText = "Средна ⚠️";
                strengthText.className = "font-bold text-amber-500";
                strengthBar.className = "h-full bg-amber-500 transition-all";
                strengthBar.style.width = "60%";
            } else {
                strengthText.innerText = "Сигурна  🔥";
                strengthText.className = "font-bold text-green-500";
                strengthBar.className = "h-full bg-green-500 transition-all";
                strengthBar.style.width = "100%";
            }
        });
    </script>

</body>
</html>
