<!DOCTYPE html>
<html>
<head>
    <title>ГДПБЗН Оперативен център</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="sidebar">
        <div>
            <a href="{{ url_for('logout') }}" class="btn-logout">Изход</a>
            <h3>ГДПБЗН</h3>
        </div>
        <p>Оператор: {{ user }}</p>
        <hr>
        {% for inc in incidents %}
        <div class="card">
            <strong>{{ inc.title }}</strong><br>
            <small>{{ inc.description }}</small>
        </div>
        {% endfor %}
    </div>
    <div id="map">{{ map_html|safe }}</div>
</body>
</html>
