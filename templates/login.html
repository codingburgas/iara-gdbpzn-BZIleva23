<!DOCTYPE html>
<html>
<head>
    <title>Вход</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: block;">
    <div class="auth-container">
        <h2>Вход в системата</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Потребител" required>
            <input type="password" name="password" placeholder="Парола" required>
            <button type="submit">Влез</button>
        </form>
        <p style="color: #333; text-align: center;">Нямате акаунт? <a href="{{ url_for('register') }}">Регистрация</a></p>
    </div>
</body>
</html>
