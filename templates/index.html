<!DOCTYPE html>
<html lang="bg">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>
<body>
    <div id="sidebar">
        <h2 style="color: var(--primary);"><i class="fas fa-fire"></i> PHOENIX</h2>
        <p style="font-size: 11px; opacity: 0.6;">ОПЕРАТИВЕН ДЕЖУРЕН: {{ user }}</p>
        <input type="text" id="smartSearch" class="search-box" placeholder="Търси" oninput="runSmartSearch()">

        {% if role in ['admin', 'firefighter'] %}
        <button class="btn btn-red" onclick="toggle('addForm')"><i class="fas fa-plus"></i> НОВ СИГНАЛ</button>
        <div id="addForm" class="admin-panel">
            <form action="{{ url_for('add_incident') }}" method="POST">
                <input type="text" name="title" placeholder="Тип (напр. Наводнение)" required>
                <input type="text" name="description" placeholder="Описание">
                <div style="display:flex; gap:5px;">
                    <input type="number" step="any" name="lat" placeholder="Lat">
                    <input type="number" step="any" name="lon" placeholder="Lon">
                </div>
                <button type="submit" class="btn btn-red" style="background:#238636">АКТИВИРАЙ</button>
            </form>
        </div>
        {% endif %}

        <div id="incidentFeed" style="flex:1; overflow-y:auto;">
            {% for inc in incidents %}
            <div class="glass-item" onclick="zoomTo({{ inc.lat }}, {{ inc.lon }}, '{{ inc.id }}')">
                <strong>{{ inc.title }}</strong>
                <p>{{ inc.description }}</p>
            </div>
            {% endfor %}
        </div>

        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn btn-red" onclick="toggleT()"><i id="ti" class="fas fa-sun"></i></button>
            <a href="{{ url_for('logout') }}" class="btn btn-red"><i class="fas fa-power-off"></i></a>
        </div>
    </div>

    <div id="map">{{ map_html|safe }}</div>
    <script>
        function toggle(id) {
            let e = document.getElementById(id);
            e.style.display = e.style.display === 'none' ? 'block' : 'none';
        }

        function runSmartSearch() {
            let query = document.getElementById('smartSearch').value.toLowerCase();
            if (query.length < 2) return;

            let match = window.incData.find(i => i.title.toLowerCase().includes(query));

            if (match) {
                zoomTo(match.lat, match.lon, match.id);
            }

            document.querySelectorAll('.glass-item').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(query) ? 'block' : 'none';
            });
        }

        function zoomTo(lat, lon, id) {
            window.mapObj.flyTo([lat, lon], 14, { animate: true, duration: 2 });

            let data = window.incData.find(x => x.id == id);
            if (data && window[data.marker_id]) {
                setTimeout(() => window[data.marker_id].openPopup(), 1800);
            }
        }

        function toggleT() {
            const h = document.documentElement;
            const isD = h.getAttribute('data-theme') === 'dark';
            const next = isD ? 'light' : 'dark';
            h.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);

            if (next === 'light') {
                window.mapObj.removeLayer(window.darkLayer);
                window.mapObj.addLayer(window.lightLayer);
                document.getElementById('ti').className = 'fas fa-moon';
            } else {
                window.mapObj.removeLayer(window.lightLayer);
                window.mapObj.addLayer(window.darkLayer);
                document.getElementById('ti').className = 'fas fa-sun';
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            setTimeout(() => {
                if (saved === 'light') {
                    window.mapObj.removeLayer(window.darkLayer);
                    window.mapObj.addLayer(window.lightLayer);
                }
            }, 600);
            anime({ targets: '#sidebar', translateX: [-360, 0], duration: 1000, easing: 'easeOutExpo' });
        };
    </script>
</body>
</html>
