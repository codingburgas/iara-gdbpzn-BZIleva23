<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Вход | PHOENIX ГДПБЗН</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 h-screen flex items-center justify-center p-4">

    <div class="bg-slate-900 border border-slate-800 max-w-md w-full rounded-2xl p-6 shadow-2xl flex flex-col gap-6">

        <div class="text-center space-y-2">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-red-950/50 border border-red-500/30 rounded-xl mb-2">
                <i class="fa-solid fa-shield-halved text-red-500 text-xl animate-pulse"></i>
            </div>
            <h1 class="text-xl font-black text-white tracking-wider uppercase">PHOENIX - ГДПБЗН</h1>
            <p class="text-xs text-slate-400">Национална Диспечерска Система за Сигурност</p>
        </div>

        <form action="/login" method="POST" class="space-y-4">

            <div>
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Потребителско име</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 text-xs">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" name="username" required autocomplete="username" placeholder="Въведете потребител..." class="w-full bg-slate-950 border border-slate-800 focus:border-red-500 focus:outline-none rounded-lg pl-9 pr-3 py-2 text-xs text-white placeholder-slate-600 transition-colors">
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Парола</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 text-xs">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 focus:border-red-500 focus:outline-none rounded-lg pl-9 pr-3 py-2 text-xs text-white placeholder-slate-600 transition-colors">
                </div>
            </div>

            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold text-xs py-2.5 rounded-lg transition-colors shadow-lg cursor-pointer mt-2 uppercase tracking-wider">
                Вход в системата
            </button>
        </form>

        <div class="text-center border-t border-slate-800/60 pt-4">
            <p class="text-[11px] text-slate-500">
                Нямате акаунт?
                <a href="/register" class="text-red-400 hover:text-red-300 font-bold ml-1 transition-colors">Регистрирайте се тук</a>
            </p>
        </div>

    </div>

</body>
</html>
